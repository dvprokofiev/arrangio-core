name: CI Check

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

  test-and-benchmark:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Test with Go CLI
        run: go test -v -race ./...

      - name: Run Benchmarks
        run: go test -bench=. -benchmem ./... | tee bench.txt

      - name: Store Benchmark Results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: "go"
          output-file-path: "bench.txt"
          comment-on-alert: true
          fail-on-alert: true
          alert-threshold: "120%"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          external-data-json-file: "benchmark_history.json"
          auto-push: false
